{% extends "base.html" %}
{% block title %}Inventory | Alimento{% endblock %}
{% block content %}
<div class="max-w-7xl mx-auto px-3 sm:px-4 lg:px-8 space-y-5 sm:space-y-6">
    <section class="glass-panel rounded-2xl p-4 sm:p-6">
        <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
            <div>
                <h1 class="text-2xl sm:text-3xl font-bold">Smart Inventory</h1>
                <p class="text-sm text-gray-600 dark:text-gray-300">Track pantry, fridge, and freezer items with low-stock and expiring alerts.</p>
            </div>
            <div id="inventorySummary" class="text-xs sm:text-sm text-gray-600 dark:text-gray-300"></div>
        </div>
    </section>

    <section class="glass-panel rounded-2xl p-4 sm:p-6">
        <h2 class="font-semibold mb-3">Add Item</h2>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3">
            <input id="invName" class="input-glass rounded-xl px-3 py-2" placeholder="Item name">
            <select id="invLocation" class="selector-pill rounded-xl px-3 py-2">
                <option value="pantry">Pantry</option>
                <option value="fridge">Fridge</option>
                <option value="freezer">Freezer</option>
            </select>
            <input id="invCategory" class="input-glass rounded-xl px-3 py-2" placeholder="Category (e.g. dairy)">
            <input id="invExpiry" type="date" class="input-glass rounded-xl px-3 py-2">
            <input id="invQty" type="number" step="0.1" class="input-glass rounded-xl px-3 py-2" placeholder="Quantity">
            <input id="invUnit" class="input-glass rounded-xl px-3 py-2" placeholder="Unit (pcs, g, ml)">
            <input id="invThreshold" type="number" step="0.1" class="input-glass rounded-xl px-3 py-2" placeholder="Low stock threshold">
            <button id="addItemBtn" class="btn-primary rounded-xl px-4 py-2 font-semibold">Add</button>
        </div>
        <p id="inventoryStatus" class="text-xs mt-2 text-gray-500"></p>
    </section>

    <section class="glass-panel rounded-2xl p-4 sm:p-6">
        <div class="flex items-center justify-between mb-3">
            <h2 class="font-semibold">Inventory List</h2>
            <button id="refreshInventoryBtn" class="btn-secondary rounded-xl px-3 py-1.5 text-sm">Refresh</button>
        </div>
        <div id="inventoryList" class="space-y-2"></div>
    </section>

    <section class="glass-panel rounded-2xl p-4 sm:p-6">
        <div class="flex items-center justify-between mb-3">
            <h2 class="font-semibold">AI Meal Suggestions (from inventory)</h2>
            <button id="suggestBtn" class="btn-primary rounded-xl px-3 py-1.5 text-sm">Generate</button>
        </div>
        <div id="suggestions" class="space-y-2 text-sm"></div>
    </section>
</div>

<script>
    function esc(s) { return String(s || '').replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m])); }

    function statusClass(status) {
        if (status === 'low_stock') return 'status-low-stock';
        if (status === 'expiring') return 'status-expiring';
        return 'status-success';
    }

    function setStatus(msg, ok) {
        const el = document.getElementById('inventoryStatus');
        el.className = `text-xs mt-2 ${ok ? 'text-green-600' : 'text-red-600'}`;
        el.textContent = msg;
    }

    function row(item) {
        const expiry = item.expires_at ? new Date(item.expires_at).toLocaleDateString() : '-';
        const qty = `${Number(item.quantity || 0)} ${item.unit || ''}`.trim();
        const badge = item.status === 'expiring' ? `Expiring (${item.days_to_expiry ?? '?' }d)` : (item.status === 'low_stock' ? 'Low stock' : 'OK');
        return `
            <div class="surface-solid rounded-xl p-3 flex items-start justify-between gap-3">
                <div>
                    <div class="font-semibold">${esc(item.name)}</div>
                    <div class="text-xs text-gray-600 dark:text-gray-300">${esc(item.location)} | ${esc(item.category || 'uncategorized')} | Qty: ${esc(qty)} | Exp: ${esc(expiry)}</div>
                </div>
                <div class="flex items-center gap-2">
                    <span class="text-xs px-2 py-1 rounded-full border ${statusClass(item.status)}">${esc(badge)}</span>
                    <button class="btn-mini btn-mini-danger" onclick="deleteItem('${item._id}')">Delete</button>
                </div>
            </div>`;
    }

    async function loadInventory() {
        const res = await fetch('/api/v3/inventory');
        const data = await res.json();
        if (!data.success) {
            setStatus(data.message || data.error || 'Could not load inventory.', false);
            return;
        }
        document.getElementById('inventoryList').innerHTML = (data.items || []).map(row).join('') || '<p class="text-sm text-gray-500">No inventory items yet.</p>';
        const s = data.summary || {};
        document.getElementById('inventorySummary').textContent = `Items: ${s.count || 0} | Low stock: ${s.low_stock || 0} | Expiring: ${s.expiring || 0}`;
    }

    async function addItem() {
        const body = {
            name: document.getElementById('invName').value.trim(),
            location: document.getElementById('invLocation').value,
            category: document.getElementById('invCategory').value.trim(),
            expires_at: document.getElementById('invExpiry').value || null,
            quantity: Number(document.getElementById('invQty').value || 0),
            unit: document.getElementById('invUnit').value.trim() || 'pcs',
            low_stock_threshold: Number(document.getElementById('invThreshold').value || 1)
        };
        const res = await fetch('/api/v3/inventory', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        const data = await res.json();
        if (!data.success) {
            setStatus(data.message || data.error || 'Could not add item.', false);
            return;
        }
        setStatus('Item added.', true);
        loadInventory();
    }

    async function deleteItem(id) {
        const res = await fetch(`/api/v3/inventory/${id}`, { method: 'DELETE' });
        const data = await res.json();
        if (!data.success) {
            setStatus(data.message || data.error || 'Could not delete item.', false);
            return;
        }
        loadInventory();
    }

    async function suggestMeals() {
        const container = document.getElementById('suggestions');
        container.innerHTML = '';
        const res = await fetch('/api/v3/inventory/suggestions', { method: 'POST' });
        const data = await res.json();
        if (!data.success) {
            container.innerHTML = `<p class="text-sm text-red-600">${esc(data.message || data.error || 'Could not generate suggestions.')}</p>`;
            return;
        }
        const meals = data.meals || [];
        container.innerHTML = meals.map(m => `
            <div class="surface-solid rounded-xl p-3">
                <div class="font-semibold">${esc(m.name)}</div>
                <p class="text-xs text-gray-600 dark:text-gray-300 mt-1">${esc(m.why || '')}</p>
                <p class="text-xs text-gray-600 dark:text-gray-300 mt-1">Uses: ${esc((m.uses || []).join(', '))}</p>
                <p class="text-xs text-gray-600 dark:text-gray-300 mt-1">${esc(m.nutrition_note || '')}</p>
            </div>
        `).join('') || '<p class="text-sm text-gray-500">No suggestions returned.</p>';
    }

    const addItemBtn = document.getElementById('addItemBtn');
    const refreshInventoryBtn = document.getElementById('refreshInventoryBtn');
    const suggestBtn = document.getElementById('suggestBtn');
    addItemBtn.addEventListener('click', () => withCtaLoading(addItemBtn, addItem, { label: 'Adding…' }));
    refreshInventoryBtn.addEventListener('click', () => withCtaLoading(refreshInventoryBtn, loadInventory, { label: 'Refreshing…' }));
    suggestBtn.addEventListener('click', () => withCtaLoading(suggestBtn, suggestMeals, { label: 'Generating…' }));
    loadInventory();
</script>
{% endblock %}
