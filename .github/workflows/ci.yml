name: CI

# Triggers: every push and every pull request targeting main
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Run the unit test suite ──────────────────────────────────────────
  test:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # Install only the packages required to import and test pure-Python
      # modules (diet_config, database).  Heavy deps (Pillow, google-generativeai)
      # are skipped to keep CI fast; they are not needed for the test suite.
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask pymongo python-dotenv flask-login authlib \
                      flask-wtf itsdangerous flask-cors requests \
                      pytest pytest-cov

      - name: Run tests with coverage
        env:
          # No real credentials needed – tests exercise offline code paths only
          MONGODB_URI: ""
          GEMINI_API_KEY: ""
          FLASK_SECRET_KEY: "ci-test-secret"
        run: |
          pytest tests/ -v --tb=short \
            --cov=diet_config --cov=database \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-py${{ matrix.python-version }}
          path: coverage.xml

  # ── Job 2: Regenerate API documentation ─────────────────────────────────────
  docs:
    name: Build API Docs
    runs-on: ubuntu-latest
    needs: test           # only run if tests pass

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies + pdoc
        run: |
          python -m pip install --upgrade pip
          pip install flask pymongo python-dotenv flask-login authlib \
                      flask-wtf itsdangerous flask-cors requests pdoc

      - name: Generate HTML documentation
        env:
          MONGODB_URI: ""
          GEMINI_API_KEY: ""
          FLASK_SECRET_KEY: "docs-build"
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pdoc diet_config database profile auth -o docs/

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-docs
          path: docs/
